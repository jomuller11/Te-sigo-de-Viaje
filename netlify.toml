[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Evita que el navegador sirva un index.html viejo cacheado
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirecciones cómodas hacia las funciones
[[redirects]]
  from = "/api/flight"
  to = "/.netlify/functions/flight"
  status = 200

[[redirects]]
  from = "/api/watch"
  to = "/.netlify/functions/watch"
  status = 200

[[redirects]]
  from = "/api/telegram-chatid"
  to = "/.netlify/functions/telegram-chatid"
  status = 200
