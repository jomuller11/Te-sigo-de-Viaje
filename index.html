<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info de Vuelo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin: 0 0 24px; }

    .search { display: flex; gap: 8px; flex-wrap: wrap; }
    input {
      background: var(--card);
      border: 1px solid var(--card2);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    #airline { width: 90px; text-transform: uppercase; }
    #number { flex: 1; min-width: 120px; }
    button {
      background: var(--accent);
      color: #0f172a;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .hint { color: var(--muted); font-size: 0.8rem; margin-top: 8px; }

    .card { background: var(--card); border-radius: 14px; padding: 20px; margin-top: 20px; }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .route { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .endpoint { flex: 1; }
    .iata { font-size: 1.8rem; font-weight: 700; }
    .airport { color: var(--muted); font-size: 0.8rem; }
    .arrow { color: var(--accent); font-size: 1.4rem; }

    #map { height: 280px; border-radius: 12px; margin-bottom: 20px; display: none; }
    .leaflet-container { background: #1a2536; }
    .plane-icon { font-size: 22px; line-height: 22px; text-align: center; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { background: var(--card2); padding: 10px 12px; border-radius: 8px; }
    .label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .value { font-size: 0.95rem; margin-top: 2px; }
    .full { grid-column: 1 / -1; }

    .msg { margin-top: 20px; color: var(--muted); }
    .error { color: var(--red); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>✈️ Info de Vuelo</h1>
    <p class="sub">Ingresá la aerolínea y el número de vuelo</p>

    <div class="search">
      <input id="airline" placeholder="AA" maxlength="3" />
      <input id="number" placeholder="100" inputmode="numeric" />
      <button id="go">Buscar</button>
    </div>
    <div class="hint">Ej: aerolínea <b>AA</b> + número <b>100</b> → vuelo AA100</div>

    <div id="result"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const result = $("result");
    let map, mapLayers = [];

    function statusColor(s) {
      const t = (s || "").toLowerCase();
      if (t.includes("arrived") || t.includes("landed")) return "var(--green)";
      if (t.includes("delay") || t.includes("expected")) return "var(--amber)";
      if (t.includes("cancel")) return "var(--red)";
      return "var(--accent)";
    }

    function fmtTime(t) {
      if (!t) return "—";
      const raw = t.local || t.utc || t;
      try {
        return new Date(raw).toLocaleString("es-AR", {
          day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit"
        });
      } catch { return raw; }
    }

    // Extrae [lat, lon] de cualquiera de las formas que devuelve la API
    function getLatLon(obj) {
      if (!obj) return null;
      const lat = obj.lat ?? obj.latitude ?? obj.gps?.lat;
      const lon = obj.lon ?? obj.lng ?? obj.longitude ?? obj.gps?.lon;
      if (typeof lat === "number" && typeof lon === "number") return [lat, lon];
      return null;
    }

    // Menor número = más relevante (lo que el usuario quiere ver primero)
    function relevance(f) {
      const s = (f.status || "").toLowerCase();
      if (getLatLon(f.location)) return 0;                 // en el aire AHORA
      if (s.includes("arrived") || s.includes("landed") || s.includes("cancel")) return 3; // ya pasó
      if (/(enroute|departed|boarding|expected|approach|checkin|scheduled|delay)/.test(s)) return 1; // por venir
      return 2;
    }

    // Distancia (ms) entre la salida del vuelo y ahora — para desempatar
    function timeDist(f) {
      const t = f.departure?.scheduledTime?.utc || f.departure?.scheduledTime?.local;
      if (!t) return Infinity;
      return Math.abs(new Date(t.replace(" ", "T")) - new Date());
    }

    function drawMap(f, mapDiv) {
      const dep = f.departure?.airport;
      const arr = f.arrival?.airport;
      const depPos = getLatLon(dep?.location || dep);
      const arrPos = getLatLon(arr?.location || arr);
      const livePos = getLatLon(f.location);

      if (!depPos && !arrPos && !livePos) return; // nada que mostrar

      mapDiv.style.display = "block";
      if (!map) {
        map = L.map(mapDiv, { attributionControl: false, zoomControl: true });
        L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
          maxZoom: 19,
        }).addTo(map);
      }
      // Limpiar capas previas
      mapLayers.forEach((l) => map.removeLayer(l));
      mapLayers = [];

      const pts = [];
      if (depPos) {
        mapLayers.push(L.circleMarker(depPos, { radius: 7, color: "#38bdf8", fillColor: "#38bdf8", fillOpacity: 1 })
          .bindTooltip(dep?.iata || "Salida").addTo(map));
        pts.push(depPos);
      }
      if (arrPos) {
        mapLayers.push(L.circleMarker(arrPos, { radius: 7, color: "#4ade80", fillColor: "#4ade80", fillOpacity: 1 })
          .bindTooltip(arr?.iata || "Llegada").addTo(map));
        pts.push(arrPos);
      }
      if (depPos && arrPos) {
        mapLayers.push(L.polyline([depPos, arrPos], { color: "#64748b", weight: 2, dashArray: "6 8" }).addTo(map));
      }
      if (livePos) {
        // El emoji ✈️ apunta al NE (~45°); lo roto para que mire al rumbo real
        const deg = (f.location?.trueTrack?.deg ?? 45) - 45;
        const icon = L.divIcon({
          className: "plane-icon",
          html: `<div style="transform:rotate(${deg}deg)">✈️</div>`,
          iconSize: [22, 22],
        });
        mapLayers.push(L.marker(livePos, { icon }).bindTooltip("En vuelo").addTo(map));
        pts.push(livePos);
      }

      if (pts.length === 1) map.setView(pts[0], 6);
      else map.fitBounds(pts, { padding: [40, 40] });
      setTimeout(() => map.invalidateSize(), 100);
    }

    function render(f, showMap) {
      const dep = f.departure || {};
      const arr = f.arrival || {};
      const ac = f.aircraft || {};
      const al = f.airline || {};
      const dist = f.greatCircleDistance;
      const loc = f.location;
      const speed = loc?.groundSpeed?.kmPerHour;
      const altF = loc?.altitude?.feet;
      const alt = (altF && altF > 0) ? altF : loc?.pressureAltitude?.feet;
      const liveHtml = loc ? `
          <div class="field"><div class="label">Velocidad</div><div class="value">${speed ? Math.round(speed) + " km/h" : "—"}</div></div>
          <div class="field"><div class="label">Altitud</div><div class="value">${alt ? Math.round(alt).toLocaleString("es-AR") + " ft" : "—"}</div></div>` : "";

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <span class="status" style="background:${statusColor(f.status)};color:#0f172a">
          ${f.status || "Estado desconocido"}
        </span>
        <div class="route">
          <div class="endpoint">
            <div class="iata">${dep.airport?.iata || dep.airport?.icao || "?"}</div>
            <div class="airport">${dep.airport?.name || ""}</div>
          </div>
          <div class="arrow">→</div>
          <div class="endpoint" style="text-align:right">
            <div class="iata">${arr.airport?.iata || arr.airport?.icao || "?"}</div>
            <div class="airport">${arr.airport?.name || ""}</div>
          </div>
        </div>
        <div class="map-slot"></div>
        <div class="grid">
          <div class="field"><div class="label">Aerolínea</div><div class="value">${al.name || "—"}</div></div>
          <div class="field"><div class="label">Vuelo</div><div class="value">${f.number || "—"}</div></div>
          <div class="field"><div class="label">Salida prog.</div><div class="value">${fmtTime(dep.scheduledTime)}</div></div>
          <div class="field"><div class="label">Salida real</div><div class="value">${fmtTime(dep.revisedTime)}</div></div>
          <div class="field"><div class="label">Llegada prog.</div><div class="value">${fmtTime(arr.scheduledTime)}</div></div>
          <div class="field"><div class="label">Llegada real</div><div class="value">${fmtTime(arr.revisedTime)}</div></div>
          <div class="field"><div class="label">Terminal salida</div><div class="value">${dep.terminal || "—"} / Gate ${dep.gate || "—"}</div></div>
          <div class="field"><div class="label">Terminal llegada</div><div class="value">${arr.terminal || "—"} / Gate ${arr.gate || "—"}</div></div>
          <div class="field"><div class="label">Avión</div><div class="value">${ac.model || "—"}</div></div>
          <div class="field"><div class="label">Matrícula</div><div class="value">${ac.reg || "—"}</div></div>
          ${liveHtml}
          ${dist ? `<div class="field full"><div class="label">Distancia</div><div class="value">${Math.round(dist.km)} km</div></div>` : ""}
        </div>`;
      result.appendChild(card);

      if (showMap) {
        const slot = card.querySelector(".map-slot");
        const mapDiv = document.createElement("div");
        mapDiv.id = "map";
        slot.appendChild(mapDiv);
        drawMap(f, mapDiv);
      }
    }

    async function search() {
      const airline = $("airline").value.trim().toUpperCase();
      const num = $("number").value.trim();
      if (!airline || !num) { result.innerHTML = `<p class="msg error">Completá aerolínea y número.</p>`; return; }

      const flight = airline + num;
      result.innerHTML = `<p class="msg">Buscando ${flight}...</p>`;
      $("go").disabled = true;
      map = null; mapLayers = [];

      try {
        const res = await fetch(`/api/flight?flight=${encodeURIComponent(flight)}`);
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || ("Error " + res.status));

        const list = Array.isArray(data) ? data : [data];
        if (!list.length) { result.innerHTML = `<p class="msg">Sin resultados para ${flight}.</p>`; return; }

        // El vuelo más relevante (en vuelo / próximo) va primero; los pasados después
        list.sort((a, b) => relevance(a) - relevance(b) || timeDist(a) - timeDist(b));

        result.innerHTML = "";
        list.forEach((f, i) => render(f, i === 0));
      } catch (err) {
        result.innerHTML = `<p class="msg error">${err.message}</p>`;
      } finally {
        $("go").disabled = false;
      }
    }

    $("go").addEventListener("click", search);
    $("number").addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });
    $("airline").addEventListener("keydown", (e) => { if (e.key === "Enter") $("number").focus(); });
  </script>
</body>
</html>
